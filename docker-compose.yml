version: '3.8'

services:
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/gym_db
      - JWT_SECRET=${JWT_SECRET:-supersecretkey123}
      - NODE_ENV=production
    depends_on:
      - mongo
    restart: always

  client:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: always

volumes:
  mongo-data:
